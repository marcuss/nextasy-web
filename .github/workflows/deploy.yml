name: Deploy Nextasy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to www.nextasy.co'
        required: true
        default: 'main'

jobs:
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "README.md" \
            --cache-control "public, max-age=31536000" \
            --metadata-directive REPLACE
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/index.html \
            s3://${{ secrets.S3_BUCKET }}/index.html \
            --metadata-directive REPLACE \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public, max-age=60, stale-while-revalidate=300" || true

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Summary
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "✅ Branch '$BRANCH' deployed to https://d3heh2lnt32ajw.cloudfront.net"
          echo "🌐 When DNS propagates: https://www.nextasy.co"
